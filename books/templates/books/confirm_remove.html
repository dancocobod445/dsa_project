{% extends "books/base.html" %}
{% block title %}Remove — {{ book.title }}{% endblock %}

{% block content %}
<div class="confirm-wrap">
  <a href="{% url 'book_list' %}" class="btn btn-outline btn-sm" style="margin-bottom:1.5rem;">← Back</a>
  <div class="confirm-card" style="border-color:rgba(192,84,74,0.3);">
    <h2 style="font-family:var(--font-display);font-size:1.3rem;color:var(--danger);margin-bottom:0.5rem;">Remove Book</h2>
    <p style="color:var(--text-muted);font-size:0.85rem;margin-bottom:1rem;">
      This will permanently delete <strong style="color:var(--text-primary);">{{ book.title }}</strong> from the library.
    </p>
    <div style="background:var(--bg-surface);border-radius:var(--radius-sm);padding:0.8rem 1rem;margin-bottom:1.5rem;border:1px solid var(--border);font-family:var(--font-mono);font-size:0.75rem;color:var(--text-muted);">
      HashTable.delete("{{ book.isbn }}")
    </div>
    <form method="post" style="display:flex;gap:10px;">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger btn-lg" style="flex:1;justify-content:center;">Yes, Remove</button>
      <a href="{% url 'book_list' %}" class="btn btn-outline btn-lg" style="flex:1;justify-content:center;">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
